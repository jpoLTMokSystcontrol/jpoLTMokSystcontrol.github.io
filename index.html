<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Maison Connectée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-card:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h2 {
            color: #333;
            font-weight: 700;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            color: white;
            width: 100%;
        }
        .btn-admin {
            background: linear-gradient(135deg, #fd7e14 0%, #e8590c 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h2><i class="fas fa-home me-2"></i>Maison Connectée</h2>
            <p>Connectez-vous pour accéder au contrôle</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Nom d'utilisateur</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Se connecter
            </button>
        </form>
        <button id="adminBtn" class="btn-admin">
            <i class="fas fa-cog me-2"></i>Administrer
        </button>
        <p class="text-center text-muted small mt-3">Accès administrateur uniquement</p>
        <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <h4 id="loadingTitle">Connexion en cours...</h4>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.0.0/mqtt.min.js"></script>
    <script>
        const MQTT_CONFIG = {
            broker: 'wss://broker.hivemq.com:8884/mqtt',
            authTimeout: 10000
        };

        let mqttClient = null;

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('d-none');
            errorDiv.textContent = message;
        }

        function showLoading(show, title = 'Connexion...') {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
            document.getElementById('loadingTitle').textContent = title;
        }

        function authenticateUser(username, password, isAdminAttempt = false) {
            showLoading(true, 'Vérification des identifiants...');
            
            const clientId = 'auth_' + Math.random().toString(16).substr(2, 8);
            mqttClient = mqtt.connect(MQTT_CONFIG.broker, {
                clientId: clientId,
                keepalive: 10,
                clean: true,
                reconnectPeriod: 0
            });

            const topicAuthRequest = 'maison/auth/request';
            const topicAuthResponse = 'maison/auth/response';

            const timeout = setTimeout(() => {
                showLoading(false);
                if (mqttClient) mqttClient.end();
                showError('Timeout - Vérifiez que l\'ESP est allumé');
            }, MQTT_CONFIG.authTimeout);

            mqttClient.on('connect', () => {
                mqttClient.subscribe(topicAuthResponse);
                mqttClient.publish(topicAuthRequest, JSON.stringify({
                    username: username,
                    password: password,
                    timestamp: Date.now()
                }));
            });

            mqttClient.on('message', (topic, message) => {
                if (topic === topicAuthResponse) {
                    clearTimeout(timeout);
                    
                    try {
                        const response = JSON.parse(message.toString());
                        
                        if (response.authenticated) {
                            sessionStorage.setItem('isLoggedIn', 'true');
                            sessionStorage.setItem('loginTime', Date.now().toString());
                            sessionStorage.setItem('username', username);
                            sessionStorage.setItem('isAdmin', response.isAdmin ? 'true' : 'false');
                            
                            showLoading(false);
                            mqttClient.end();
                            
                            if (isAdminAttempt) {
                                if (response.isAdmin) {
                                    window.location.href = 'admin.html';
                                } else {
                                    showError('Accès administrateur refusé');
                                }
                            } else {
                                window.location.href = 'commande.html';
                            }
                        } else {
                            showLoading(false);
                            mqttClient.end();
                            showError('Identifiants incorrects');
                        }
                    } catch (error) {
                        showLoading(false);
                        mqttClient.end();
                        showError('Erreur de communication');
                    }
                }
            });

            mqttClient.on('error', () => {
                clearTimeout(timeout);
                showLoading(false);
                mqttClient.end();
                showError('Erreur de connexion au système');
            });
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (username && password) {
                authenticateUser(username, password, false);
            } else {
                showError('Veuillez remplir tous les champs');
            }
        });

        document.getElementById('adminBtn').addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (username && password) {
                authenticateUser(username, password, true);
            } else {
                showError('Veuillez entrer vos identifiants');
            }
        });
    </script>
</body>
</html>
