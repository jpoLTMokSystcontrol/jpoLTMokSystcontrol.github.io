<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle - Maison Connectée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            margin-bottom: 30px;
        }
        .navbar-brand {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .connection-status-box {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            color: white;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .connected .status-indicator { background: #28a745; animation: pulse 2s infinite; }
        .disconnected .status-indicator { background: #dc3545; }
        .no-access .status-indicator { background: #ffc107; }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .lamp-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            transition: transform 0.3s;
        }
        .lamp-card:hover {
            transform: translateY(-5px);
        }
        .lamp-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: none;
            font-size: 18px;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            cursor: default;
        }
        .lamp-btn.on {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            box-shadow: 0 0 30px rgba(40, 167, 69, 0.5);
        }
        .lamp-btn.off {
            background: linear-gradient(135deg, #6c757d, #495057);
            color: white;
        }
        .lamp-btn.waiting {
            background: linear-gradient(135deg, #ffc107, #fd7e14);
            color: white;
            animation: pulse 1s infinite;
        }
        .lamp-btn.disconnected {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }
        .lamp-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .control-btn {
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 600;
            margin: 5px;
            transition: all 0.3s;
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .serrure-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 30px;
        }
        .btn-lock {
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            max-width: 300px;
        }
        .btn-lock.open {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }
        .btn-lock.closed {
            background: linear-gradient(135deg, #fd7e14, #dc3545);
            color: white;
        }
        .btn-lock:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .btn-lock:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            z-index: 1000;
            transform: translateX(150%);
            transition: transform 0.3s;
        }
        .notification.show {
            transform: translateX(0);
        }
        .notification.success { background: #28a745; }
        .notification.error { background: #dc3545; }
        .notification.info { background: #17a2b8; }
        .notification.warning { background: #ffc107; color: #000; }
        .refresh-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            font-size: 0.9rem;
            z-index: 100;
        }
        .pending-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffc107;
            margin-left: 5px;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>

    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand">
                <i class="fas fa-home me-2"></i>Contrôle Maison
            </span>
            <div class="d-flex align-items-center gap-3">
                <div class="connection-status-box" id="espStatus">
                    <span class="status-indicator"></span>
                    <span id="statusText">Connexion en cours...</span>
                </div>
                <button id="logoutBtn" class="btn btn-logout">
                    <i class="fas fa-sign-out-alt me-1"></i>Déconnexion
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Lampes -->
        <div class="row">
            <div class="col-md-3">
                <div class="lamp-card text-center">
                    <h5>Lampe 1 (Salon)</h5>
                    <div class="lamp-btn disconnected" id="lamp1Btn">
                        <div class="lamp-icon"><i class="fas fa-lightbulb"></i></div>
                        <span id="lamp1Text">Inaccessible</span>
                    </div>
                    <div>
                        <button id="lamp1On" class="btn btn-success control-btn" disabled>
                            <i class="fas fa-power-on me-1"></i>ON
                        </button>
                        <button id="lamp1Off" class="btn btn-danger control-btn" disabled>
                            <i class="fas fa-power-off me-1"></i>OFF
                        </button>
                    </div>
                    <div id="lamp1Pending" class="pending-indicator" style="display: none;"></div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="lamp-card text-center">
                    <h5>Lampe 2 (Cuisine)</h5>
                    <div class="lamp-btn disconnected" id="lamp2Btn">
                        <div class="lamp-icon"><i class="fas fa-lightbulb"></i></div>
                        <span id="lamp2Text">Inaccessible</span>
                    </div>
                    <div>
                        <button id="lamp2On" class="btn btn-success control-btn" disabled>
                            <i class="fas fa-power-on me-1"></i>ON
                        </button>
                        <button id="lamp2Off" class="btn btn-danger control-btn" disabled>
                            <i class="fas fa-power-off me-1"></i>OFF
                        </button>
                    </div>
                    <div id="lamp2Pending" class="pending-indicator" style="display: none;"></div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="lamp-card text-center">
                    <h5>Lampe 3 (Chambre)</h5>
                    <div class="lamp-btn disconnected" id="lamp3Btn">
                        <div class="lamp-icon"><i class="fas fa-lightbulb"></i></div>
                        <span id="lamp3Text">Inaccessible</span>
                    </div>
                    <div>
                        <button id="lamp3On" class="btn btn-success control-btn" disabled>
                            <i class="fas fa-power-on me-1"></i>ON
                        </button>
                        <button id="lamp3Off" class="btn btn-danger control-btn" disabled>
                            <i class="fas fa-power-off me-1"></i>OFF
                        </button>
                    </div>
                    <div id="lamp3Pending" class="pending-indicator" style="display: none;"></div>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="lamp-card text-center">
                    <h5>Lampe 4 (Extérieur)</h5>
                    <div class="lamp-btn disconnected" id="lamp4Btn">
                        <div class="lamp-icon"><i class="fas fa-lightbulb"></i></div>
                        <span id="lamp4Text">Inaccessible</span>
                    </div>
                    <div>
                        <button id="lamp4On" class="btn btn-success control-btn" disabled>
                            <i class="fas fa-power-on me-1"></i>ON
                        </button>
                        <button id="lamp4Off" class="btn btn-danger control-btn" disabled>
                            <i class="fas fa-power-off me-1"></i>OFF
                        </button>
                    </div>
                    <div id="lamp4Pending" class="pending-indicator" style="display: none;"></div>
                </div>
            </div>
        </div>

        <!-- Serrure -->
        <div class="row">
            <div class="col-12">
                <div class="serrure-card text-center">
                    <h4><i class="fas fa-lock me-2"></i>Serrure électrique</h4>
                    <button id="lockBtn" class="btn-lock closed" disabled>
                        <i class="fas fa-lock me-2"></i>Serrure fermée
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="refresh-overlay">
        <i class="fas fa-sync-alt me-2"></i>Mise à jour toutes les 2 secondes
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.0.0/mqtt.min.js"></script>
    <script>
        // Configuration
        const CONFIG = {
            mqtt: {
                broker: 'wss://broker.hivemq.com:8884/mqtt',
                clientId: 'web_' + Math.random().toString(16).substr(2, 8)
            },
            topics: {
                connection: 'maison/connexion/etat',
                lamp1: { state: 'maison/lampe1/etat', cmd: 'maison/lampe1/cmd' },
                lamp2: { state: 'maison/lampe2/etat', cmd: 'maison/lampe2/cmd' },
                lamp3: { state: 'maison/lampe3/etat', cmd: 'maison/lampe3/cmd' },
                lamp4: { state: 'maison/lampe4/etat', cmd: 'maison/lampe4/cmd' },
                lock: { state: 'maison/serrure/etat', cmd: 'maison/serrure/cmd' }
            },
            espTimeout: 10000,
            commandTimeout: 5000
        };

        let mqttClient = null;
        let espState = 'disconnected';
        let lastEspMessage = 0;
        
        // États réels (venant de l'ESP/PIC)
        let lampStates = {1: false, 2: false, 3: false, 4: false};
        let lockState = false;
        
        // Commandes en attente de confirmation (uniquement pour les lampes)
        let pendingLampCommands = {
            1: null,
            2: null,
            3: null,
            4: null
        };

        // Vérifier l'authentification
        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            const loginTime = sessionStorage.getItem('loginTime');
            
            if (!isLoggedIn || !loginTime) {
                window.location.href = 'index.html';
                return false;
            }
            
            const sessionDuration = 2 * 60 * 60 * 1000;
            if (Date.now() - parseInt(loginTime) > sessionDuration) {
                sessionStorage.clear();
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }

        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        function updateEspStatus(status, message) {
            espState = status;
            const statusDiv = document.getElementById('espStatus');
            statusDiv.className = 'connection-status-box ' + status;
            document.getElementById('statusText').textContent = message;

            // Activer/désactiver les contrôles
            const enabled = status === 'connected';
            document.querySelectorAll('.control-btn, #lockBtn').forEach(btn => {
                btn.disabled = !enabled;
            });

            if (status !== 'connected') {
                // Mettre tous les boutons en état inaccessible
                for (let i = 1; i <= 4; i++) {
                    const btn = document.getElementById(`lamp${i}Btn`);
                    const text = document.getElementById(`lamp${i}Text`);
                    btn.className = 'lamp-btn disconnected';
                    text.textContent = 'Inaccessible';
                }
                
                const lockBtn = document.getElementById('lockBtn');
                lockBtn.className = 'btn-lock closed';
                lockBtn.innerHTML = '<i class="fas fa-lock me-2"></i>Serrure inaccessible';
            }
        }

        function updateLampState(lamp, state) {
            // Si l'état reçu correspond à une commande en attente
            if (pendingLampCommands[lamp] !== null) {
                if (pendingLampCommands[lamp] === state) {
                    // Commande confirmée
                    pendingLampCommands[lamp] = null;
                    document.getElementById(`lamp${lamp}Pending`).style.display = 'none';
                    showNotification(`Lampe ${lamp} ${state ? 'allumée' : 'éteinte'}`, 'success');
                }
            }
            
            lampStates[lamp] = state;
            const btn = document.getElementById(`lamp${lamp}Btn`);
            const text = document.getElementById(`lamp${lamp}Text`);
            
            btn.className = `lamp-btn ${state ? 'on' : 'off'}`;
            text.textContent = state ? 'ALLUMÉE' : 'ÉTEINTE';
        }

        function updateLockState(state) {
            lockState = state;
            const lockBtn = document.getElementById('lockBtn');
            
            if (state) {
                lockBtn.className = 'btn-lock open';
                lockBtn.innerHTML = '<i class="fas fa-lock-open me-2"></i>Serrure ouverte';
            } else {
                lockBtn.className = 'btn-lock closed';
                lockBtn.innerHTML = '<i class="fas fa-lock me-2"></i>Serrure fermée';
            }
        }

        function sendLampCommand(lamp, command, expectedState) {
            if (espState !== 'connected') {
                showNotification('ESP non disponible', 'error');
                return;
            }
            
            if (pendingLampCommands[lamp] !== null) {
                showNotification('Une commande est déjà en cours pour cette lampe', 'warning');
                return;
            }
            
            if (mqttClient && mqttClient.connected) {
                // Marquer la commande comme en attente
                pendingLampCommands[lamp] = expectedState;
                document.getElementById(`lamp${lamp}Pending`).style.display = 'inline-block';
                
                // Timeout pour la confirmation
                setTimeout(() => {
                    if (pendingLampCommands[lamp] !== null) {
                        pendingLampCommands[lamp] = null;
                        document.getElementById(`lamp${lamp}Pending`).style.display = 'none';
                        showNotification(`Pas de confirmation du PIC pour lampe ${lamp}`, 'warning');
                    }
                }, CONFIG.commandTimeout);
                
                // Envoyer la commande
                mqttClient.publish(CONFIG.topics[`lamp${lamp}`].cmd, command);
                console.log(`Commande lampe ${lamp} envoyée: ${command}`);
            }
        }

        function sendLockCommand() {
            if (espState !== 'connected') {
                showNotification('ESP non disponible', 'error');
                return;
            }
            
            if (mqttClient && mqttClient.connected) {
                const newState = !lockState;
                const command = newState ? 'ON' : 'OFF';
                
                // Envoyer la commande (pas d'attente de confirmation)
                mqttClient.publish(CONFIG.topics.lock.cmd, command);
                console.log(`Commande serrure envoyée: ${command}`);
                
                // Mettre à jour l'état immédiatement (la serrure est contrôlée par l'ESP)
                updateLockState(newState);
                showNotification(`Serrure ${newState ? 'ouverte' : 'fermée'}`, 'success');
            }
        }

        function connectMQTT() {
            mqttClient = mqtt.connect(CONFIG.mqtt.broker, {
                clientId: CONFIG.mqtt.clientId,
                keepalive: 30,
                clean: true
            });

            mqttClient.on('connect', () => {
                console.log('Connecté au broker MQTT');
                
                // S'abonner à tous les topics d'état
                mqttClient.subscribe(CONFIG.topics.connection);
                mqttClient.subscribe(CONFIG.topics.lamp1.state);
                mqttClient.subscribe(CONFIG.topics.lamp2.state);
                mqttClient.subscribe(CONFIG.topics.lamp3.state);
                mqttClient.subscribe(CONFIG.topics.lamp4.state);
                mqttClient.subscribe(CONFIG.topics.lock.state);
                
                updateEspStatus('connecting', 'Attente du PIC...');
            });

            mqttClient.on('message', (topic, message) => {
                const msg = message.toString();
                lastEspMessage = Date.now();
                
                if (topic === CONFIG.topics.connection) {
                    if (msg === 'connecte') {
                        updateEspStatus('connected', 'Maison connectée');
                    } else {
                        updateEspStatus('no-access', 'Maison inaccessible');
                    }
                } else if (topic === CONFIG.topics.lamp1.state) {
                    updateLampState(1, msg === 'ON');
                } else if (topic === CONFIG.topics.lamp2.state) {
                    updateLampState(2, msg === 'ON');
                } else if (topic === CONFIG.topics.lamp3.state) {
                    updateLampState(3, msg === 'ON');
                } else if (topic === CONFIG.topics.lamp4.state) {
                    updateLampState(4, msg === 'ON');
                } else if (topic === CONFIG.topics.lock.state) {
                    updateLockState(msg === 'ON');
                }
            });

            mqttClient.on('error', (err) => {
                console.error('Erreur MQTT:', err);
                updateEspStatus('disconnected', 'Erreur de connexion');
            });

            mqttClient.on('close', () => {
                updateEspStatus('disconnected', 'Déconnecté');
            });
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAuth()) return;

            // Configurer les boutons des lampes
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`lamp${i}On`).addEventListener('click', () => {
                    sendLampCommand(i, 'ON', true);
                });
                
                document.getElementById(`lamp${i}Off`).addEventListener('click', () => {
                    sendLampCommand(i, 'OFF', false);
                });
            }

            // Bouton serrure (toggle)
            document.getElementById('lockBtn').addEventListener('click', sendLockCommand);

            // Déconnexion
            document.getElementById('logoutBtn').addEventListener('click', () => {
                sessionStorage.clear();
                if (mqttClient) mqttClient.end();
                window.location.href = 'index.html';
            });

            // Connexion MQTT
            connectMQTT();

            // Rafraîchissement automatique toutes les 2 secondes
            setInterval(() => {
                // Vérifier la connexion ESP
                if (espState === 'connected' && Date.now() - lastEspMessage > CONFIG.espTimeout) {
                    updateEspStatus('no-access', 'Maison inaccessible');
                    
                    // Réinitialiser les commandes en attente
                    for (let i = 1; i <= 4; i++) {
                        pendingLampCommands[i] = null;
                        document.getElementById(`lamp${i}Pending`).style.display = 'none';
                    }
                }
            }, 2000);
        });
    </script>
</body>
</html>
