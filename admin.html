<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - Maison Connectée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #fd7e14 0%, #e8590c 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            margin-bottom: 30px;
        }
        .navbar-brand {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .admin-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .mqtt-status {
            font-size: 0.9rem;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .mqtt-connected {
            background: rgba(40, 167, 69, 0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .mqtt-disconnected {
            background: rgba(220, 53, 69, 0.2);
            color: white;
        }
        .current-user {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            z-index: 1000;
            transform: translateX(150%);
            transition: transform 0.3s;
        }
        .notification.show {
            transform: translateX(0);
        }
        .notification.success { background: #28a745; }
        .notification.error { background: #dc3545; }
        .notification.info { background: #17a2b8; }
    </style>
</head>
<body>
    <div class="notification" id="notification"></div>

    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand">
                <i class="fas fa-cog me-2"></i>Administration
            </span>
            <div class="d-flex align-items-center gap-3">
                <div class="mqtt-status mqtt-disconnected" id="mqttStatus">
                    <i class="fas fa-plug"></i>
                    <span>Connexion en cours...</span>
                </div>
                <button id="backBtn" class="btn btn-back">
                    <i class="fas fa-arrow-left me-1"></i>Retour
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Liste des utilisateurs -->
        <div class="admin-card">
            <h4 class="mb-4">
                <i class="fas fa-users me-2"></i>Gestion des utilisateurs
                <span class="badge bg-secondary" id="userCount">0/4</span>
            </h4>
            
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Utilisateur</th>
                            <th>Mot de passe</th>
                            <th>Type</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Ajout d'utilisateur -->
        <div class="admin-card">
            <h5 class="mb-3"><i class="fas fa-user-plus me-2"></i>Ajouter un utilisateur</h5>
            <form id="addUserForm">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="newUsername" 
                               placeholder="Nom d'utilisateur" required>
                    </div>
                    <div class="col-md-4">
                        <input type="password" class="form-control" id="newPassword" 
                               placeholder="Mot de passe" required>
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" id="newUserType">
                            <option value="false">Utilisateur</option>
                            <option value="true">Administrateur</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-plus"></i> Ajouter
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Code serrure -->
        <div class="admin-card">
            <h5 class="mb-3"><i class="fas fa-lock me-2"></i>Code de la serrure</h5>
            <div class="row g-3 align-items-center">
                <div class="col-md-4">
                    <input type="password" class="form-control" id="lockCode" 
                           value="1234" maxlength="4" placeholder="Code 4 chiffres">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-warning" id="modifyLockCode">
                        <i class="fas fa-edit me-1"></i>Modifier
                    </button>
                </div>
                <div class="col-md-6">
                    <small class="text-muted">
                        <i class="fas fa-info-circle me-1"></i>
                        Code par défaut: 1234
                    </small>
                </div>
            </div>
        </div>

        <!-- Bouton global Enregistrer -->
        <div class="text-center mb-4">
            <button class="btn btn-lg btn-success" id="saveAllBtn">
                <i class="fas fa-save me-2"></i>Enregistrer toutes les modifications
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.0.0/mqtt.min.js"></script>
    <script>
        const CONFIG = {
            mqtt: {
                broker: 'wss://broker.hivemq.com:8884/mqtt',
                clientId: 'admin_' + Math.random().toString(16).substr(2, 8)
            },
            topics: {
                get_users: 'maison/admin/get',
                update_user: 'maison/admin/update',
                response: 'maison/admin/response',
                lock_code: 'maison/admin/lockcode'
            },
            maxUsers: 4,
            defaultUsers: [
                {username: 'LTMad', password: 'Fad', isAdmin: true},
                {username: 'LTM2', password: 'F2', isAdmin: false},
                {username: 'LTM3', password: 'F3', isAdmin: false},
                {username: 'LTM4', password: 'F4', isAdmin: false}
            ]
        };

        let mqttClient = null;
        let users = [...CONFIG.defaultUsers];
        let currentUsername = sessionStorage.getItem('username') || '';
        let pendingChanges = new Set();

        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            setTimeout(() => notification.classList.remove('show'), 3000);
        }

        function updateMQTTStatus(connected, message) {
            const statusDiv = document.getElementById('mqttStatus');
            statusDiv.className = `mqtt-status ${connected ? 'mqtt-connected' : 'mqtt-disconnected'}`;
            statusDiv.querySelector('span').textContent = message;
        }

        function displayUsers() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            
            users.forEach((user, index) => {
                const row = document.createElement('tr');
                if (user.username === currentUsername) {
                    row.classList.add('current-user');
                }
                
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>
                        <input type="text" class="form-control form-control-sm user-username" 
                               value="${user.username || ''}" data-index="${index}"
                               ${user.username === 'LTMad' ? 'readonly' : ''}>
                    </td>
                    <td>
                        <input type="password" class="form-control form-control-sm user-password" 
                               value="${user.password || ''}" data-index="${index}">
                    </td>
                    <td>
                        <select class="form-select form-select-sm user-type" data-index="${index}"
                                ${user.username === 'LTMad' ? 'disabled' : ''}>
                            <option value="false" ${!user.isAdmin ? 'selected' : ''}>Utilisateur</option>
                            <option value="true" ${user.isAdmin ? 'selected' : ''}>Administrateur</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-success save-user" data-index="${index}"
                                ${user.username ? '' : 'disabled'}>
                            <i class="fas fa-save"></i> Modifier
                        </button>
                        ${user.username && user.username !== 'LTMad' ? 
                            `<button class="btn btn-sm btn-danger delete-user" data-index="${index}">
                                <i class="fas fa-trash"></i>
                            </button>` : ''}
                    </td>
                `;
                
                tbody.appendChild(row);
            });

            // Mettre à jour le compteur
            const count = users.filter(u => u.username).length;
            document.getElementById('userCount').textContent = `${count}/4`;

            addEventListeners();
        }

        function addEventListeners() {
            document.querySelectorAll('.save-user').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    saveUser(index);
                });
            });

            document.querySelectorAll('.delete-user').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    deleteUser(index);
                });
            });
        }

        function saveUser(index) {
            const usernameInput = document.querySelector(`.user-username[data-index="${index}"]`);
            const passwordInput = document.querySelector(`.user-password[data-index="${index}"]`);
            const typeSelect = document.querySelector(`.user-type[data-index="${index}"]`);
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const isAdmin = typeSelect ? typeSelect.value === 'true' : users[index].isAdmin;
            
            if (!username || !password) {
                showNotification('Tous les champs sont requis', 'error');
                return;
            }

            const data = {
                index: index,
                username: username,
                password: password,
                isAdmin: isAdmin,
                action: users[index].username ? 'update_single' : 'add_single'
            };

            if (mqttClient && mqttClient.connected) {
                mqttClient.publish(CONFIG.topics.update_user, JSON.stringify(data));
                showNotification('Modification envoyée', 'success');
            } else {
                showNotification('Non connecté à l\'ESP', 'error');
            }
        }

        function deleteUser(index) {
            if (users[index].username === 'LTMad') {
                showNotification('L\'administrateur principal ne peut être supprimé', 'error');
                return;
            }

            if (confirm(`Supprimer l'utilisateur ${users[index].username} ?`)) {
                const data = {
                    index: index,
                    action: 'delete_single'
                };

                if (mqttClient && mqttClient.connected) {
                    mqttClient.publish(CONFIG.topics.update_user, JSON.stringify(data));
                }
            }
        }

        function saveAllChanges() {
            pendingChanges.forEach(index => {
                saveUser(parseInt(index));
            });
            pendingChanges.clear();
        }

        function connectMQTT() {
            mqttClient = mqtt.connect(CONFIG.mqtt.broker, {
                clientId: CONFIG.mqtt.clientId,
                keepalive: 30,
                clean: true
            });

            mqttClient.on('connect', () => {
                updateMQTTStatus(true, 'Connecté à l\'ESP');
                mqttClient.subscribe(CONFIG.topics.response);
                
                setTimeout(() => {
                    mqttClient.publish(CONFIG.topics.get_users, 'get_users');
                }, 1000);
            });

            mqttClient.on('message', (topic, message) => {
                if (topic === CONFIG.topics.response) {
                    try {
                        const data = JSON.parse(message.toString());
                        
                        if (data.type === 'users_list' && data.users) {
                            // Limiter à 4 utilisateurs
                            users = data.users.slice(0, 4);
                            displayUsers();
                        } else if (data.success) {
                            showNotification(data.message || 'Opération réussie', 'success');
                            mqttClient.publish(CONFIG.topics.get_users, 'get_users');
                        }
                    } catch (e) {
                        console.error('Erreur parsing:', e);
                    }
                }
            });

            mqttClient.on('error', () => {
                updateMQTTStatus(false, 'Erreur de connexion');
            });

            mqttClient.on('close', () => {
                updateMQTTStatus(false, 'Déconnecté');
            });
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            const isAdmin = sessionStorage.getItem('isAdmin');
            if (!isAdmin || isAdmin !== 'true') {
                window.location.href = 'index.html';
                return;
            }

            displayUsers();
            connectMQTT();

            document.getElementById('backBtn').addEventListener('click', () => {
                sessionStorage.removeItem('isAdmin');
                window.location.href = 'index.html';
            });

            document.getElementById('addUserForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const username = document.getElementById('newUsername').value.trim();
                const password = document.getElementById('newPassword').value.trim();
                const isAdmin = document.getElementById('newUserType').value === 'true';
                
                if (!username || !password) return;
                
                // Vérifier si maximum atteint
                const activeCount = users.filter(u => u.username).length;
                if (activeCount >= 4) {
                    showNotification('Maximum 4 utilisateurs atteint', 'error');
                    return;
                }
                
                // Vérifier si l'utilisateur existe déjà
                if (users.some(u => u.username === username)) {
                    showNotification('Cet utilisateur existe déjà', 'error');
                    return;
                }
                
                // Trouver un index libre
                const freeIndex = users.findIndex(u => !u.username);
                if (freeIndex === -1) {
                    showNotification('Plus de place disponible', 'error');
                    return;
                }

                const data = {
                    index: freeIndex,
                    username: username,
                    password: password,
                    isAdmin: isAdmin,
                    action: 'add_single'
                };

                if (mqttClient && mqttClient.connected) {
                    mqttClient.publish(CONFIG.topics.update_user, JSON.stringify(data));
                    document.getElementById('addUserForm').reset();
                }
            });

            document.getElementById('modifyLockCode').addEventListener('click', () => {
                const newCode = document.getElementById('lockCode').value.trim();
                if (newCode && newCode.length === 4 && /^\d+$/.test(newCode)) {
                    if (mqttClient && mqttClient.connected) {
                        mqttClient.publish(CONFIG.topics.lock_code, newCode);
                        showNotification('Code serrure modifié', 'success');
                    }
                } else {
                    showNotification('Le code doit être 4 chiffres', 'error');
                }
            });

            document.getElementById('saveAllBtn').addEventListener('click', saveAllChanges);
        });
    </script>
</body>
</html>
